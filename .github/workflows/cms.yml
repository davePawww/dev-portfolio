name: CMS

on:
  push:
    branches: [main]
    paths:
      - 'cms/**'
      - '.github/workflows/cms.yml'
  pull_request:
    branches: [main]
    paths:
      - 'cms/**'
      - '.github/workflows/cms.yml'

concurrency:
  group: cms-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: ./cms

jobs:
  ci:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 11.1.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ./cms/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Studio
        run: pnpm build

  deploy:
    name: Deploy to Sanity
    if: github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest
    environment:
      name: production
      # url: https://<your-host>.sanity.studio (set after first deploy)
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v4
        name: Install pnpm
        with:
          version: 11.1.3

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: ./cms/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy Studio
        run: npx sanity deploy
        env:
          SANITY_AUTH_TOKEN: ${{ secrets.SANITY_AUTH_TOKEN }}
